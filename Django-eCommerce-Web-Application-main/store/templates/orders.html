{% extends "base.html" %}
{% block content %}

<h2>Your Orders</h2>

{% for order in orders %}
<div class="product-card">
    <p>Order ID: {{ order.id }}</p>
    <p>Status: {{ order.status }}</p>
    <p>Total: ₹ {{ order.total_amount }}</p>
</div>
{% empty %}
<p>No orders yet.</p>
{% endfor %}

{% endblock %}

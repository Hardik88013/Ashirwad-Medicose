{% extends "base.html" %}
{% block content %}

<div style="display:flex; gap:40px; background:white; padding:30px; border-radius:10px;">
    <div>
        {% if product.image %}
            <img src="{{ product.image.url }}" width="350">
        {% endif %}
    </div>

    <div>
        <h2>{{ product.name }}</h2>
        <h3>₹ {{ product.price }}</h3>
        <p>{{ product.description }}</p>

        <a href="{% url 'add_to_cart' product.id %}">
            <button>Add to Cart</button>
        </a>
    </div>
</div>

{% endblock %}

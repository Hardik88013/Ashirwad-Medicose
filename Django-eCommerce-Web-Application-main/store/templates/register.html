<!DOCTYPE html>
<html>
<head>
    <title>Register - Ashirwad World</title>
</head>
<body style="background:#EAEDED;">
<div style="width:350px;margin:80px auto;background:white;padding:30px;border-radius:8px;">
    <h2>Ashirwad World</h2>
    <h3>Register</h3>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required><br><br>
        <input type="password" name="password" placeholder="Password" required><br><br>
        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>

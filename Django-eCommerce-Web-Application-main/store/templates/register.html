{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - Ashirwad Medicose</title>
    <link rel="stylesheet" href="{% static 'css/amazon.css' %}">
</head>
<body>

<div class="premium-bg">

    <div class="glass-card">

        <h1 class="brand">Ashirwad Medicose 💊</h1>
        <p class="subtitle">Create your account</p>

        <h2>Join Us</h2>

        {% if messages %}
            <div class="messages" style="margin-bottom: 20px;">
                {% for message in messages %}
                    <p style="color: {% if message.tags == 'error' %}#d32f2f{% else %}#2e7d32{% endif %}; font-size: 14px; font-weight: bold; background: {% if message.tags == 'error' %}#feebee{% else %}#e8f5e9{% endif %}; padding: 10px; border-radius: 5px;">
                        {{ message }}
                    </p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="name" placeholder="Full Name (Owner Details)" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="mobile" placeholder="Mobile Number" required>
            <input type="number" name="age" placeholder="Age">
            
            <select name="gender" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>

            <input type="text" name="username" placeholder="Choose a Username" required>

            <div class="password-box">
                <input type="password" name="password" id="password" placeholder="Password" required>
                <span onclick="togglePassword()">👁️</span>
            </div>

            <button type="submit">Register</button>
        </form>

        <p class="switch">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>

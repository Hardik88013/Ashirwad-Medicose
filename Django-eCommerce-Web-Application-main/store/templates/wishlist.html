{% extends "base.html" %}
{% block content %}

<h2>Your Wishlist</h2>

{% for item in items %}
<div class="product-card">
    <h3>{{ item.product.name }}</h3>
    <p>₹ {{ item.product.price }}</p>
    <a href="{% url 'toggle_wishlist' item.product.id %}">Remove</a>
</div>
{% empty %}
<p>No items in wishlist.</p>
{% endfor %}

{% endblock %}

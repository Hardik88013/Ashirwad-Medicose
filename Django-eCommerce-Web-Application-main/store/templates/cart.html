{% extends "base.html" %}
{% block content %}

<h2>Your Cart</h2>

{% for item in items %}
<div class="product-card">
    <h3>{{ item.product.name }}</h3>
    <p>₹ {{ item.product.price }}</p>
    <p>Quantity: {{ item.quantity }}</p>

    <a href="{% url 'update_cart_quantity' item.id 'increase' %}">+</a>
    <a href="{% url 'update_cart_quantity' item.id 'decrease' %}">-</a>
    <a href="{% url 'remove_from_cart' item.id %}">Remove</a>
</div>
{% empty %}
<p>Cart is empty.</p>
{% endfor %}

<h3>Total: ₹ {{ total }}</h3>

<a href="{% url 'checkout' %}">
    <button>Proceed to Checkout</button>
</a>

{% endblock %}
